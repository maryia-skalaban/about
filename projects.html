  <script src="script.js"></script>
  <script>
    // Projects page overlay
    const overlay = document.getElementById('overlay');
    const iframe = document.getElementById('proj-iframe');
    const hint = document.getElementById('fullscreen-hint');
    const closeBtn = document.getElementById('close-btn');

    document.querySelectorAll('.proj-card:not(.proj-placeholder)').forEach(card => {
      card.addEventListener('click', () => {
        iframe.src = card.dataset.url;
        overlay.classList.add('active');
        hint.style.animation = 'none'; void hint.offsetWidth; hint.style.animation = 'fadeInOut 4s forwards';
      });
    });

    function closeOverlay() {
      overlay.classList.remove('active');
      setTimeout(() => { iframe.src = ''; }, 400);
    }
    closeBtn.addEventListener('click', closeOverlay);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
  </script>
